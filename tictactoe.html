<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 8px #e94560; }
      to   { box-shadow: 0 0 20px #e94560; }
    }

    #restart {
      margin-top: 28px;
      padding: 12px 36px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 10px;
      border: 1px solid #0f3460;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #888; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div class="score-box x-score">X <span id="score-x">0</span></div>
    <div class="score-box draw-score">Draw <span id="score-d">0</span></div>
    <div class="score-box o-score">O <span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, scores;

    function init(resetScores = false) {
      board = Array(9).fill(null);
      current = "X";
      gameOver = false;
      if (resetScores || !scores) scores = { X: 0, O: 0, D: 0 };

      document.querySelectorAll(".cell").forEach(c => {
        c.textContent = "";
        c.className = "cell";
      });
      setStatus(`Player ${current}'s turn`);
      updateScoreDisplay();
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function updateScoreDisplay() {
      document.getElementById("score-x").textContent = scores.X;
      document.getElementById("score-o").textContent = scores.O;
      document.getElementById("score-d").textContent = scores.D;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById("board").addEventListener("click", e => {
      const cell = e.target.closest(".cell");
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), "taken");

      const win = checkWinner();
      if (win) {
        win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add("win"));
        setStatus(`Player ${current} wins! 🎉`);
        scores[current]++;
        updateScoreDisplay();
        gameOver = true;
      } else if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScoreDisplay();
        gameOver = true;
      } else {
        current = current === "X" ? "O" : "X";
        setStatus(`Player ${current}'s turn`);
      }
    });

    document.getElementById("restart").addEventListener("click", () => init());

    init(true);
  </script>

</body>
</html>
